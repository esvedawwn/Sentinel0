openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sentinel file intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard metrics and summaries
  - name: scans
    description: File scan operations
  - name: files
    description: File management and categorisation
  - name: duplicates
    description: Duplicate file detection and resolution
  - name: categories
    description: File categories
  - name: activity
    description: Activity log
  - name: reports
    description: Reports and analytics
  - name: findings
    description: Real scan findings (empty folders, zero-byte, lock files, duplicates, etc.)
  - name: scan-roots
    description: Previously scanned directory roots, for quick re-scanning
  - name: search
    description: Unified search across findings (structured filters + natural-language interpretation)
  - name: review
    description: Findings review workflow (status transitions, bulk actions, audit log, action queue)
  - name: extraction
    description: Document text extraction, OCR, sensitive-content detection, and entity extraction
  - name: settings
    description: User privacy and processing settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary metrics
      description: Returns total files, organised %, duplicates count, space saved, and system status
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent activity for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /dashboard/category-breakdown:
    get:
      operationId: getDashboardCategoryBreakdown
      tags: [dashboard]
      summary: File counts grouped by category
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /dashboard/needs-attention:
    get:
      operationId: getDashboardNeedsAttention
      tags: [dashboard]
      summary: Items requiring user attention
      responses:
        "200":
          description: Attention items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttentionSummary"

  /scans:
    get:
      operationId: listScans
      tags: [scans]
      summary: List all scans
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scan"
    post:
      operationId: createScan
      tags: [scans]
      summary: Start a new scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "201":
          description: Scan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"

  /scans/{id}:
    get:
      operationId: getScan
      tags: [scans]
      summary: Get scan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "404":
          description: Not found

  /scans/{id}/cancel:
    post:
      operationId: cancelScan
      tags: [scans]
      summary: Cancel a running scan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List indexed files
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ready, review, action_required, corrupted]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"

  /files/{id}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get file by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "404":
          description: Not found
    patch:
      operationId: updateFile
      tags: [files]
      summary: Update file category or tags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUpdate"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"

  /files/stats:
    get:
      operationId: getFileStats
      tags: [files]
      summary: File statistics summary
      responses:
        "200":
          description: File statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileStats"

  /duplicates:
    get:
      operationId: listDuplicates
      tags: [duplicates]
      summary: List duplicate file groups
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, resolved, ignored, false_positive]
        - name: sort
          in: query
          schema:
            type: string
            enum: [wastedBytes, createdAt]
            default: wastedBytes
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Duplicate groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateListResponse"

  /duplicates/{id}/resolve:
    post:
      operationId: resolveDuplicate
      tags: [duplicates]
      summary: Resolve a duplicate group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateResolveInput"
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateGroup"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity log entries
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /reports/overview:
    get:
      operationId: getReportsOverview
      tags: [reports]
      summary: Full report overview with charts data
      responses:
        "200":
          description: Reports overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportsOverview"

  /reports/scan-history:
    get:
      operationId: getReportsScanHistory
      tags: [reports]
      summary: Scan history over time
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Scan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanHistoryEntry"

  /findings:
    get:
      operationId: listFindings
      tags: [findings]
      summary: List scan findings with optional filters
      parameters:
        - name: scanId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [empty_folder, zero_byte, idlk_file, locked_file, installer, archive, large_file, duplicate]
        - name: findingStatus
          in: query
          schema:
            type: string
            enum: [safe_delete, review, duplicate]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Findings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingsListResponse"

  /findings/summary:
    get:
      operationId: getFindingsSummary
      tags: [findings]
      summary: Findings count summary by type and status
      parameters:
        - name: scanId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingsSummary"

  /ai/status:
    get:
      operationId: getAIStatus
      tags: [ai]
      summary: Current AI subsystem status (local/cloud/offline, active provider)
      responses:
        "200":
          description: AI status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIStatusResponse"

  /ai/search:
    get:
      operationId: interpretSearch
      tags: [ai]
      summary: Interpret a natural-language search query into structured filters (local rules only)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Interpreted query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISearchInterpretation"

  /findings/{id}/ignore:
    patch:
      operationId: ignoreFinding
      tags: [findings]
      summary: Mark a finding as ignored (does not delete the finding or its scan history)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IgnoreFindingInput"
      responses:
        "200":
          description: Ignored finding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "404":
          description: Finding not found

  /findings/{id}/unignore:
    patch:
      operationId: unignoreFinding
      tags: [findings]
      summary: Clear a previous ignore decision for a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Un-ignored finding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "404":
          description: Finding not found

  /scan-roots:
    get:
      operationId: listScanRoots
      tags: [scan-roots]
      summary: List previously scanned directory roots, most recently scanned first
      responses:
        "200":
          description: Scan roots list
          content:
            application/json:
              schema:
                type: object
                required: [roots]
                properties:
                  roots:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanRoot"

  /findings/clear:
    delete:
      operationId: clearFindings
      tags: [findings]
      summary: Clear all findings (or by scanId)
      parameters:
        - name: scanId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                required: [cleared]
                properties:
                  cleared:
                    type: integer

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Unified search across findings — combines a natural-language query with explicit, editable filters
      description: >
        `q` (if present) is run through the local NL interpreter first; any explicit filter
        params override/extend the interpreted ones. Every call is recorded in search history.
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: path
          in: query
          schema:
            type: string
        - name: extension
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: aiCategory
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: riskLevel
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: minSizeBytes
          in: query
          schema:
            type: integer
        - name: maxSizeBytes
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: scanId
          in: query
          schema:
            type: integer
        - name: duplicatesOnly
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: recordHistory
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /search/history:
    get:
      operationId: listSearchHistory
      tags: [search]
      summary: Recent search history, most recent first
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search history
          content:
            application/json:
              schema:
                type: object
                required: [history]
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/SearchHistoryEntry"
    delete:
      operationId: clearSearchHistory
      tags: [search]
      summary: Clear all search history
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                required: [cleared]
                properties:
                  cleared:
                    type: integer

  /search/saved:
    get:
      operationId: listSavedSearches
      tags: [search]
      summary: List saved searches
      responses:
        "200":
          description: Saved searches
          content:
            application/json:
              schema:
                type: object
                required: [savedSearches]
                properties:
                  savedSearches:
                    type: array
                    items:
                      $ref: "#/components/schemas/SavedSearch"
    post:
      operationId: createSavedSearch
      tags: [search]
      summary: Save the current query + filters under a name
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSearchInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedSearch"

  /search/saved/{id}:
    patch:
      operationId: updateSavedSearch
      tags: [search]
      summary: Rename or update the filters of a saved search
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSearchInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedSearch"
        "404":
          description: Not found
    delete:
      operationId: deleteSavedSearch
      tags: [search]
      summary: Delete a saved search
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean

  /findings/{id}/review:
    post:
      operationId: reviewFinding
      tags: [review]
      summary: Apply a review decision to a single finding (never modifies the underlying file)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewFindingInput"
      responses:
        "200":
          description: Updated finding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "404":
          description: Finding not found

  /findings/bulk-review:
    post:
      operationId: bulkReviewFindings
      tags: [review]
      summary: Apply a review decision to multiple findings at once (never modifies underlying files)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReviewFindingsInput"
      responses:
        "200":
          description: Bulk review result
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer

  /findings/{id}/audit:
    get:
      operationId: getFindingAudit
      tags: [review]
      summary: Full audit trail of review decisions for one finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/FindingAuditEntry"

  /action-queue:
    get:
      operationId: listActionQueue
      tags: [review]
      summary: List proposed (never-executed) file operations awaiting a future explicit trigger
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, dismissed]
      responses:
        "200":
          description: Action queue
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActionQueueEntry"

  /action-queue/{id}/dismiss:
    patch:
      operationId: dismissActionQueueItem
      tags: [review]
      summary: Dismiss a queued action without ever performing it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionQueueEntry"
        "404":
          description: Not found

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Current privacy / extraction / OCR settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettingsResponse"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update privacy / extraction / OCR settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettingsResponse"

  /findings/{id}/extract:
    post:
      operationId: extractFindingText
      tags: [extraction]
      summary: Run text extraction (and OCR if applicable/enabled) for one finding, on demand
      description: >
        Extraction is always per-file and on demand — there is no bulk/automatic mode.
        Fails with 409 if extraction is disabled in Settings for the required mode
        (OCR / cloud consent).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedTextEntry"
        "404":
          description: Finding not found
        "409":
          description: Extraction/OCR disabled in settings

  /findings/{id}/extraction:
    get:
      operationId: getFindingExtraction
      tags: [extraction]
      summary: Latest extracted text + detected entities + sensitive-content flags for a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionDetailResponse"
        "404":
          description: No extraction on file for this finding

  /findings/{id}/summarize:
    post:
      operationId: summarizeFinding
      tags: [extraction]
      summary: Generate an AI summary for one explicitly selected document (requires cloud consent if a cloud provider is used)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
        "404":
          description: No extracted text to summarize
        "409":
          description: Cloud consent required

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      required:
        - totalFiles
        - organisedPercent
        - duplicatesCount
        - spaceSavedBytes
        - bytesRecoverable
        - corruptedCount
        - inProgressScans
        - systemStatus
        - lastScanAt
        - currentScanPath
        - currentScanProgress
      properties:
        totalFiles:
          type: integer
        organisedPercent:
          type: number
        duplicatesCount:
          type: integer
        spaceSavedBytes:
          type: integer
        bytesRecoverable:
          type: integer
        corruptedCount:
          type: integer
        inProgressScans:
          type: integer
        systemStatus:
          type: string
          enum: [ready, scanning, idle]
        lastScanAt:
          type: ["string", "null"]
        currentScanPath:
          type: ["string", "null"]
        currentScanProgress:
          type: ["integer", "null"]

    CategoryCount:
      type: object
      required: [category, count, label, icon]
      properties:
        category:
          type: string
        label:
          type: string
        icon:
          type: string
        count:
          type: integer
        percentOfTotal:
          type: number

    AttentionSummary:
      type: object
      required: [corruptedFiles, duplicates, untaggedFiles]
      properties:
        corruptedFiles:
          type: integer
        duplicates:
          type: integer
        untaggedFiles:
          type: integer

    Scan:
      type: object
      required: [id, path, mode, status, filesScanned, foldersScanned, bytesScanned, filesTotal, findingsCount, startedAt]
      properties:
        id:
          type: integer
        path:
          type: string
        mode:
          type: string
          enum: [real, sample, simulate]
        status:
          type: string
          enum: [pending, running, completed, cancelled, failed]
        filesScanned:
          type: integer
        foldersScanned:
          type: integer
        bytesScanned:
          type: integer
        filesTotal:
          type: integer
        findingsCount:
          type: integer
        progressPercent:
          type: integer
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        duplicatesFound:
          type: integer
        corruptedFound:
          type: integer

    IgnoreFindingInput:
